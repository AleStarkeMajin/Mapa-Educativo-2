<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Auth Handler</title>
  </head>
  <body>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <script>
      // Configuración tomada de src/firebase-applet-config.json
      const firebaseConfig = {
        apiKey: "AIzaSyAGq0p8l2wztZldBe_XyH6KBnS2YaSYYWc",
        authDomain: "gen-lang-client-0537030034.firebaseapp.com",
        projectId: "gen-lang-client-0537030034",
        storageBucket: "gen-lang-client-0537030034.firebasestorage.app",
        messagingSenderId: "1018012942854",
        appId: "1:1018012942854:web:82e676d8d8bb6a6475b987",
        measurementId: "",
      };

      // Inicializa Firebase (compat)
      if (!window.firebase.apps?.length) {
        firebase.initializeApp(firebaseConfig);
      }

      const auth = firebase.auth();

      function notifyOpener(payload) {
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage(payload, window.location.origin);
          }
        } catch (e) {
          // ignore
        }
      }

      // Espera a que el estado de autenticación cambie (útil para flujos popup)
      // No cerramos la ventana inmediatamente; la cerramos solo cuando el usuario
      // ha terminado el flujo de autenticación.
      const statusEl = document.createElement("div");
      statusEl.style.fontFamily = "Inter, system-ui, Arial";
      statusEl.style.padding = "16px";
      statusEl.innerText = "Esperando autenticación...";
      document.body.appendChild(statusEl);

      const btnClose = document.createElement("button");
      btnClose.innerText = "Cerrar ventana (manual)";
      btnClose.style.marginTop = "12px";
      btnClose.onclick = () => {
        try {
          window.close();
        } catch (e) {
          // ignore
        }
      };
      document.body.appendChild(btnClose);

      const authTimeout = setTimeout(() => {
        notifyOpener({ type: "firebase-auth", error: "timeout" });
        statusEl.innerText = "Tiempo agotado esperando autenticación.";
      }, 120000); // 2 minutos

      const unsubscribe = auth.onAuthStateChanged((user) => {
        if (user) {
          notifyOpener({
            type: "firebase-auth",
            user: {
              uid: user.uid,
              email: user.email,
              displayName: user.displayName,
            },
          });
          clearTimeout(authTimeout);
          statusEl.innerText = `Autenticado: ${user.email || user.uid}`;
          // Solo intentamos cerrar si la ventana fue abierta por una ventana padre
          if (window.opener && !window.opener.closed) {
            try {
              window.close();
            } catch (e) {
              // ignore
            }
          }
          unsubscribe();
          const resultPre = document.createElement("pre");
          resultPre.style.whiteSpace = "pre-wrap";
          resultPre.style.fontSize = "13px";
          resultPre.style.marginTop = "12px";
          const resultObj = {
            status: "success",
            uid: user.uid,
            email: user.email,
            displayName: user.displayName,
          };
          resultPre.innerText = JSON.stringify(resultObj, null, 2);
          document.body.appendChild(resultPre);
          // save for later inspection
          try {
            localStorage.setItem(
              "firebase-auth-last",
              JSON.stringify(resultObj),
            );
          } catch (e) {}
          statusEl.innerText = `Autenticado: ${user.email || user.uid}`;
          // show auto-close countdown and manual close
          let countdown = 10;
          const countdownEl = document.createElement("div");
          countdownEl.style.marginTop = "8px";
          countdownEl.innerText = `Esta ventana se cerrará automáticamente en ${countdown} s`;
          document.body.appendChild(countdownEl);
          const closeInterval = setInterval(() => {
            countdown -= 1;
            countdownEl.innerText = `Esta ventana se cerrará automáticamente en ${countdown} s`;
            if (countdown <= 0) {
              clearInterval(closeInterval);
              // Solo cerramos si fue abierta por la ventana padre
              if (window.opener && !window.opener.closed) {
                try {
                  window.close();
                } catch (e) {}
              }
            }
          }, 1000);
        }
      });
    </script>
  </body>
</html>
