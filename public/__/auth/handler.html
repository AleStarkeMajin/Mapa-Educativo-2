<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Auth Handler</title>
  </head>
  <body>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <script>
      // Configuración tomada de src/firebase-applet-config.json
      const firebaseConfig = {
        apiKey: "AIzaSyAGq0p8l2wztZldBe_XyH6KBnS2YaSYYWc",
        authDomain: "gen-lang-client-0537030034.firebaseapp.com",
        projectId: "gen-lang-client-0537030034",
        storageBucket: "gen-lang-client-0537030034.firebasestorage.app",
        messagingSenderId: "1018012942854",
        appId: "1:1018012942854:web:82e676d8d8bb6a6475b987",
        measurementId: ""
      };

      // Inicializa Firebase (compat)
      if (!window.firebase.apps?.length) {
        firebase.initializeApp(firebaseConfig);
      }

      const auth = firebase.auth();

      function notifyOpener(payload) {
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage(payload, window.location.origin);
          }
        } catch (e) {
          // ignore
        }
      }

      // Procesa el resultado de redirect/popup y notifica a la ventana origin
      auth.getRedirectResult()
        .then((result) => {
          notifyOpener({ type: 'firebase-auth', resultPresent: !!result?.user });
        })
        .catch((err) => {
          notifyOpener({ type: 'firebase-auth', error: err && err.code ? err.code : String(err) });
        })
        .finally(() => {
          // intenta cerrar el popup
          try { window.close(); } catch (e) { /* ignore */ }
        });
    </script>
  </body>
</html>
